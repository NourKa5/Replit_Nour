kind = "web"
previewPath = "/"
title = "Career Website"
version = "1.0.0"
id = "artifacts/career-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20723

[services.development]
run = "pnpm --filter @workspace/career-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-website", "run", "build" ]
publicDir = "artifacts/career-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20723"
BASE_PATH = "/"
